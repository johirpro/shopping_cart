version: '3.9'

services:

  nginx:
    image: nginx:stable
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - php
    networks:
      - app

  php:
    build: ./docker/php
    volumes:
      - ./backend:/var/www
    working_dir: /var/www
    networks:
      - app

  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: cart_app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    networks:
      - app

  node:
    image: node:22
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    networks:
      - app

networks:
  app:
